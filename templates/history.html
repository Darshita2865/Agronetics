<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Agronetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-50">
    <div class="max-w-md mx-auto min-h-screen bg-white relative pb-20">
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-5 py-5 text-white rounded-b-3xl">
            <h1 class="text-xl font-bold text-center">Scan History</h1>
        </div>
        
        <div class="p-4">
            <div id="historyList" class="space-y-3">
                <div class="text-center py-10 text-gray-500">Loading...</div>
            </div>
        </div>
        
        <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-md border-t border-gray-200 rounded-t-2xl shadow-2xl py-2 px-3 z-30">
            <div class="flex justify-around items-center">
                <a href="/" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">home</span>
                    <span class="text-[11px]">Home</span>
                </a>
                <a href="/scan" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">photo_camera</span>
                    <span class="text-[11px]">Scan</span>
                </a>
                <a href="/history" class="flex flex-col items-center text-emerald-500 font-medium">
                    <span class="material-symbols-outlined text-2xl">history</span>
                    <span class="text-[11px]">History</span>
                </a>
                <a href="/profile" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">person</span>
                    <span class="text-[11px]">Profile</span>
                </a>
            </div>
        </nav>
    </div>
    
    <script>
        const historyData = {{ history | tojson | safe }};
        
        function loadHistory() {
            const container = document.getElementById('historyList');
            if (!historyData || historyData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500">No scans yet. <a href="/scan" class="text-emerald-500">Start scanning →</a></div>`;
                return;
            }
            
            container.innerHTML = historyData.map(scan => `
                <div class="bg-gray-50 rounded-xl p-3 flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-emerald-600">eco</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold">${scan.prediction}</p>
                        <p class="text-xs text-gray-500">${Math.round(scan.confidence * 100)}% confidence</p>
                        <p class="text-xs text-gray-400">${new Date(scan.timestamp).toLocaleDateString()}</p>
                    </div>
                </div>
            `).join('');
        }
        
        loadHistory();
    </script>
</body>
</html>
