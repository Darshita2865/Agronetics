<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Results - AgroScan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .severity-critical { border-left-color: #dc2626; background-color: #fef2f2; }
        .severity-high { border-left-color: #f97316; background-color: #fff7ed; }
        .severity-moderate { border-left-color: #f59e0b; background-color: #fffbeb; }
        .severity-good { border-left-color: #10b981; background-color: #ecfdf5; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-50">
    <div class="max-w-md mx-auto bg-white min-h-screen relative pb-24">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-5 py-5 text-white rounded-b-3xl shadow-lg">
            <div class="flex items-center">
                <button onclick="window.location.href='/'" class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">home</span>
                </button>
                <h1 class="text-xl font-bold flex-1 text-center">Diagnosis Results</h1>
                <div class="w-9"></div>
            </div>
            <p class="text-center text-emerald-100 text-xs mt-1">AI-powered plant health analysis</p>
        </div>

        <!-- Results Content -->
        <div class="p-4" id="resultContent">
            <div class="text-center py-10">
                <div class="spinner-border animate-spin inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full"></div>
                <p class="mt-3 text-gray-500">Loading results...</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-md border-t border-gray-200 rounded-t-2xl shadow-2xl py-2 px-3 z-30">
            <div class="flex justify-around items-center">
                <a href="/" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">home</span>
                    <span class="text-[11px]">Home</span>
                </a>
                <a href="/scan" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">photo_camera</span>
                    <span class="text-[11px]">Scan</span>
                </a>
                <a href="/history" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">history</span>
                    <span class="text-[11px]">History</span>
                </a>
                <a href="/profile" class="flex flex-col items-center text-gray-500 hover:text-emerald-500">
                    <span class="material-symbols-outlined text-2xl">person</span>
                    <span class="text-[11px]">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script>
        const scanData = JSON.parse(localStorage.getItem('lastScanResult') || '{}');
        
        function getSeverityClass(severity) {
            if (severity === 'Critical') return 'severity-critical';
            if (severity === 'High') return 'severity-high';
            if (severity === 'Moderate') return 'severity-moderate';
            return 'severity-good';
        }
        
        if (scanData.success) {
            const severityClass = getSeverityClass(scanData.severity);
            const confidencePercent = Math.round(scanData.confidence * 100);
            
            document.getElementById('resultContent').innerHTML = `
                <!-- Main Diagnosis Card -->
                <div class="text-center mb-6">
                    <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto shadow-lg">
                        <span class="material-symbols-outlined text-5xl text-emerald-600">eco</span>
                    </div>
                    <h2 class="text-2xl font-bold mt-3 text-gray-800">${scanData.prediction}</h2>
                    <div class="inline-flex items-center gap-1 bg-emerald-100 px-3 py-1 rounded-full mt-2">
                        <span class="material-symbols-outlined text-emerald-600 text-sm">verified</span>
                        <p class="text-emerald-600 font-semibold text-sm">${confidencePercent}% Confidence</p>
                    </div>
                </div>
                
                <!-- Severity Indicator -->
                <div class="mb-4 p-3 rounded-xl ${severityClass} border-l-4">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">priority_high</span>
                        <span class="font-semibold">Severity: ${scanData.severity}</span>
                    </div>
                </div>
                
                <!-- Symptoms Section -->
                <div class="bg-gray-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-emerald-600">symptoms</span>
                        📋 Symptoms
                    </h3>
                    <p class="text-gray-600 text-sm">${scanData.disease_info?.symptoms || 'Visual symptoms detected on leaves. Discoloration or spots present.'}</p>
                </div>
                
                <!-- Cause Section -->
                <div class="bg-red-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-red-600">warning</span>
                        ⚠️ Cause
                    </h3>
                    <p class="text-gray-600 text-sm">${scanData.disease_info?.cause || 'Could be caused by fungal, bacterial, or viral infection.'}</p>
                </div>
                
                <!-- Treatment Section -->
                <div class="bg-amber-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-amber-600">medication</span>
                        💊 Treatment
                    </h3>
                    <p class="text-gray-600 text-sm">${scanData.disease_info?.treatment || 'Remove affected parts. Apply appropriate treatment.'}</p>
                </div>
                
                <!-- Prevention Section -->
                <div class="bg-green-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-green-600">grass</span>
                        🌱 Prevention
                    </h3>
                    <p class="text-gray-600 text-sm">${scanData.disease_info?.prevention || 'Practice crop rotation. Maintain proper spacing.'}</p>
                </div>
                
                <!-- Organic Treatment -->
                <div class="bg-emerald-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-emerald-600">eco</span>
                        🌿 Organic Treatment
                    </h3>
                    <p class="text-gray-600 text-sm">${scanData.disease_info?.organic_treatment || 'Apply neem oil or copper-based fungicide.'}</p>
                </div>
                
                <!-- Nutrient Deficiency Section -->
                <div class="bg-purple-50 rounded-xl p-4 mb-4 border-l-4 border-purple-500">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-purple-600">science</span>
                        🧪 Nutrient Analysis
                    </h3>
                    <p class="text-gray-700 text-sm font-medium mb-2">${scanData.disease_info?.deficiency || 'Consider soil testing for accurate diagnosis.'}</p>
                    <div class="bg-purple-100 rounded-lg p-3 mt-2">
                        <p class="text-sm text-gray-700"><span class="font-bold">💡 Recommendation:</span> ${scanData.disease_info?.nutrientFix || 'Apply balanced NPK fertilizer.'}</p>
                    </div>
                </div>
                
                <!-- Top 3 Predictions -->
                <div class="bg-blue-50 rounded-xl p-4 mb-4">
                    <h3 class="font-bold mb-3 flex items-center gap-2 text-gray-700">
                        <span class="material-symbols-outlined text-blue-600">show_chart</span>
                        🏆 Top Alternative Diagnoses
                    </h3>
                    ${scanData.top3 ? scanData.top3.slice(1).map(pred => `
                        <div class="flex justify-between items-center py-2 border-b border-blue-100 last:border-0">
                            <span class="text-sm text-gray-700">${pred.name}</span>
                            <span class="text-sm font-semibold text-blue-600">${Math.round(pred.confidence * 100)}%</span>
                        </div>
                    `).join('') : '<p class="text-sm text-gray-500">No alternative diagnoses available</p>'}
                </div>
                
                <!-- Action Buttons -->
                <div class="mt-6 flex gap-3">
                    <button onclick="window.location.href='/scan'" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl flex items-center justify-center gap-2 font-semibold shadow-md">
                        <span class="material-symbols-outlined text-lg">photo_camera</span>
                        New Scan
                    </button>
                    <button onclick="window.location.href='/history'" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl flex items-center justify-center gap-2 font-semibold">
                        <span class="material-symbols-outlined text-lg">history</span>
                        History
                    </button>
                </div>
            `;
        } else {
            document.getElementById('resultContent').innerHTML = `
                <div class="text-center py-10">
                    <span class="material-symbols-outlined text-5xl text-gray-400">error</span>
                    <p class="mt-3 text-red-600 font-medium">No scan data found.</p>
                    <p class="text-gray-500 text-sm mt-1">Please scan a leaf first.</p>
                    <a href="/scan" class="inline-block mt-6 bg-emerald-500 text-white px-6 py-2 rounded-xl">Start a Scan →</a>
                </div>
            `;
        }
    </script>
</body>
</html>
