        // Function to get disease info from database
        function getDiseaseInfo(prediction) {
            // Try exact match first
            if (diseaseDatabase[prediction]) {
                return diseaseDatabase[prediction];
            }
            
            // Try partial match
            for (const [key, info] of Object.entries(diseaseDatabase)) {
                if (prediction.toLowerCase().includes(key.toLowerCase()) || 
                    key.toLowerCase().includes(prediction.toLowerCase())) {
                    return info;
                }
            }
            
            // Check if it's a healthy plant
            if (prediction.toLowerCase().includes('healthy')) {
                return diseaseDatabase['Tomato - Healthy'];
            }
            
            // Check for deficiency keywords
            if (prediction.toLowerCase().includes('deficiency')) {
                if (prediction.toLowerCase().includes('nitrogen')) return diseaseDatabase['Nitrogen Deficiency'];
                if (prediction.toLowerCase().includes('potassium')) return diseaseDatabase['Potassium Deficiency'];
                if (prediction.toLowerCase().includes('magnesium')) return diseaseDatabase['Magnesium Deficiency'];
                if (prediction.toLowerCase().includes('iron')) return diseaseDatabase['Iron Deficiency'];
                if (prediction.toLowerCase().includes('phosphorus')) return diseaseDatabase['Phosphorus Deficiency'];
            }
            
            // Default return
            return {
                title: prediction,
                icon: 'science',
                severity: 'mild',
                symptoms: '• Visual symptoms detected on leaves or fruit\n• Discoloration or spots present\n• Abnormal growth patterns observed',
                cause: 'May be caused by fungal, bacterial, or viral infection. Environmental stress or nutrient deficiency could also be factors.',
                treatment: '1. Remove affected plant parts\n2. Improve air circulation\n3. Avoid overhead watering\n4. Apply appropriate fungicide if needed',
                prevention: '• Practice crop rotation\n• Use disease-resistant varieties\n• Maintain proper plant nutrition\n• Regular monitoring',
                organicTreatment: 'Apply neem oil or copper-based organic fungicides. Remove and destroy infected material.',
                deficiency: 'Nutrient levels should be tested if symptoms persist. Consider balanced fertilization.',
                nutrientFix: 'Test soil before applying fertilizers. Use compost to improve overall soil health.'
            };
        }

                        <span class="material-symbols-outlined text-lg">priority_high</span>

                    </div>

                    </button>
                </div>
            `;
        } else {
            document.getElementById('resultContent').innerHTML = `
                <div class="text-center py-10">
                    <span class="material-symbols-outlined text-5xl text-gray-400">error</span>
                    <p class="mt-3 text-red-600 font-medium">No scan data found.</p>
                    <p class="text-gray-500 text-sm mt-1">Please scan a leaf first.</p>
                    <a href="/scan" class="inline-block mt-6 bg-emerald-500 text-white px-6 py-2 rounded-xl">Start a Scan →</a>
                </div>
            `;
        }
    </script>
</body>
</html>
